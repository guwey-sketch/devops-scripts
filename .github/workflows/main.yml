name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Print message
        run: echo "CI/CD workflow has been triggered!"
      - name: Run a simple build step
        run: |
          echo "Building the project..."
          echo "Project built successfully!"